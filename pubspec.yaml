    - assets/splash/cloudy.png
    - assets/detection/leaf.png
    - assets/detection/antifungal.png
    - assets/auth/google.svg
    - assets/auth/apple.svg
    - assets/auth/facebook-1.svg
    - assets/navbar/home.svg
    - assets/navbar/market.svg
    - assets/navbar/scanner.svg
    - assets/navbar/user.svg