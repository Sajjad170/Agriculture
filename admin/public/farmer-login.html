<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriTrack — Farmer Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #d1fae5 0%, #f0fdf4 60%, #dcfce7 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 24px 64px rgba(0,0,0,0.1); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon { width: 72px; height: 72px; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 12px; box-shadow: 0 8px 24px rgba(34,197,94,.3); }
    .logo h1 { font-size: 24px; font-weight: 800; color: #111827; }
    .logo p { font-size: 14px; color: #6b7280; margin-top: 4px; }
    .tabs { display: flex; background: #f3f4f6; border-radius: 12px; padding: 4px; margin-bottom: 28px; gap: 4px; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: none; color: #6b7280; transition: all .2s; }
    .tab.active { background: #fff; color: #16a34a; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .form-section { display: none; }
    .form-section.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; color: #111827; outline: none; transition: border-color .2s; background: #fafafa; }
    input:focus { border-color: #22c55e; background: #fff; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .2s; box-shadow: 0 4px 16px rgba(34,197,94,.3); }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { background: #fee2e2; color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .hint { text-align: center; margin-top: 16px; font-size: 12px; color: #9ca3af; }
    .hint a { color: #16a34a; font-weight: 600; text-decoration: none; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: #e5e7eb; }
    .divider span { font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <h1>AgriTrack</h1>
      <p>Smart Agriculture Platform — Pakistan</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>
    <div class="error" id="error-msg"></div>

    <!-- LOGIN -->
    <div class="form-section active" id="section-login">
      <form id="login-form">
        <div class="form-group"><label>Email Address</label><input type="email" id="login-email" placeholder="farmer@gmail.com" value="farmer@gmail.com" required /></div>
        <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" value="Farmer123" required /></div>
        <button type="submit" class="btn" id="login-btn">Sign In</button>
      </form>
      <div class="hint">Demo: <strong>farmer@gmail.com</strong> / <strong>Farmer123</strong></div>
    </div>

    <!-- REGISTER -->
    <div class="form-section" id="section-register">
      <form id="register-form">
        <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" placeholder="Muhammad Ahmed" required /></div>
        <div class="form-group"><label>Email Address</label><input type="email" id="reg-email" placeholder="ahmed@gmail.com" required /></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="reg-phone" placeholder="+92 300 0000000" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="reg-pass" placeholder="Min 6 characters" required /></div>
        <button type="submit" class="btn" id="reg-btn">Create Account</button>
      </form>
    </div>

    <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>
    <div class="hint"><a href="/login.html">Admin Panel →</a></div>
  </div>

  <script>
    function switchTab(t) {
      document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
      document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
      document.getElementById('section-'+t).classList.add('active');
      document.getElementById('error-msg').style.display = 'none';
    }
    const errEl = document.getElementById('error-msg');
    function showErr(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault(); errEl.style.display = 'none';
      const btn = document.getElementById('login-btn'); btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const r = await fetch('/api/auth/farmer-login', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value }) });
        const d = await r.json();
        if (d.success) window.location.href = '/farmer.html';
        else showErr(d.error || 'Login failed');
      } catch { showErr('Connection error'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    });

    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault(); errEl.style.display = 'none';
      const btn = document.getElementById('reg-btn'); btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const r = await fetch('/api/users', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({ name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: document.getElementById('reg-pass').value, role: 'farmer' }) });
        const d = await r.json();
        if (d.id) {
          switchTab('login');
          document.getElementById('login-email').value = document.getElementById('reg-email').value;
          document.getElementById('error-msg').style.background='#dcfce7'; document.getElementById('error-msg').style.color='#16a34a';
          showErr('Account created! Please sign in.');
        } else showErr(d.error || 'Registration failed');
      } catch { showErr('Connection error'); }
      finally { btn.disabled = false; btn.textContent = 'Create Account'; }
    });
  </script>
</body>
</html>
