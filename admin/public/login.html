<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriTrack Admin — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #22c55e;
      --green-dark: #16a34a;
      --bg: #f0fdf4;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --red: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #d1fae5 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
    }
    .logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; color: var(--text);
      background: #fafafa; transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: var(--green); background: #fff; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: opacity .2s; letter-spacing: .3px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #fee2e2; color: var(--red);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .hint { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
    .hint span { color: var(--green); font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🌱</div>
      <h1>AgriTrack Admin</h1>
      <p>Sign in to the admin dashboard</p>
    </div>
    <div class="error" id="error-msg"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="user@gmail.com" value="user@gmail.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" value="User123" required />
      </div>
      <button type="submit" class="btn" id="login-btn">Sign In</button>
    </form>
    <p class="hint">Admin credentials: <span>user@gmail.com</span> / <span>User123</span></p>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          errorMsg.textContent = data.error || 'Login failed';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
