workflows:
  android-release:
    name: AgriTrack Android APK
    max_build_duration: 60
    environment:
      flutter: 3.32.0
      android_signing:
        - agritrack_keystore
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release \
            --dart-define=BASE_URL=https://62717973-4b7a-4a00-8530-aacf8e2b64b4-00-1jmy84mplsnow.sisko.replit.dev
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
